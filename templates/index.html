<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Forecasting System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">
    
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">📈 Sales Forecasting System</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body p-5">
                        <h3 class="text-center mb-4">Stock / Sales Predictor</h3>
                        
                        {% if error %}
                        <div class="alert alert-danger" role="alert">
                            {{ error }}
                        </div>
                        {% endif %}

                        <form action="/predict" method="POST">
                            <div class="mb-3">
                                <label for="tickerSelect" class="form-label">Ticker Symbol</label>
                                <select class="form-select mb-2" id="tickerSelect" onchange="document.getElementById('ticker').value = this.value">
                                    <option value="" selected>Type manually...</option>
                                    {% for symbol, name in popular_tickers.items() %}
                                    <option value="{{ symbol }}">{{ symbol }} - {{ name }}</option>
                                    {% endfor %}
                                </select>
                                <input type="text" class="form-control" id="ticker" name="ticker" placeholder="e.g. AAPL, GOOGL" required>
                                <div class="form-text">Enter manual ticker or select one from the list above.</div>
                            </div>

                            <div class="mb-3">
                                <label for="period" class="form-label">Historical Data Period</label>
                                <select class="form-select" id="period" name="period">
                                    <option value="6mo">6 Months</option>
                                    <option value="1y">1 Year</option>
                                    <option value="2y" selected>2 Years</option>
                                    <option value="5y">5 Years</option>
                                    <option value="max">Max Available</option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label for="days" class="form-label">Forecast Days</label>
                                <input type="number" class="form-control" id="days" name="days" value="30" min="7" max="90" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 btn-lg">🚀 Generate Forecast</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
